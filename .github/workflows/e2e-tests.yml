name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      registry:
        image: registry:2.8
        ports:
          - 5000:5000
        env:
          REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /data
        volumes:
          - /tmp/registry-data:/data
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:5000/v2/"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'bun'

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.1.0'

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: Build application
        run: bun run build

      - name: Generate session secret
        run: echo "SESSION_SECRET=$(openssl rand -base64 32)" >> .env.local

      - name: Start application
        run: bun run start &
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Wait for application to be ready
        run: |
          timeout 120 bash -c 'until curl -f http://localhost:3000 > /dev/null 2>&1; do sleep 5; done'
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Run E2E tests
        run: bun run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-videos
          path: test-results/
          retention-days: 7

  e2e-tests-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        browser: [chromium, firefox]
        shard: [1, 2, 3]

    services:
      registry:
        image: registry:2.8
        ports:
          - 5000:5000
        env:
          REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /data
        volumes:
          - /tmp/registry-data:/data
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:5000/v2/"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'bun'

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.1.0'

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: Build application
        run: bun run build

      - name: Generate session secret
        run: echo "SESSION_SECRET=$(openssl rand -base64 32)" >> .env.local

      - name: Start application
        run: bun run start &
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Wait for application to be ready
        run: |
          timeout 120 bash -c 'until curl -f http://localhost:3000 > /dev/null 2>&1; do sleep 5; done'
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Run E2E tests (${{ matrix.browser }}, shard ${{ matrix.shard }})
        run: bunx playwright test --project=${{ matrix.browser }} --shard=${{ matrix.shard }}/3
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 30

  visual-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      registry:
        image: registry:2.8
        ports:
          - 5000:5000
        env:
          REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /data
        volumes:
          - /tmp/registry-data:/data
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:5000/v2/"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'bun'

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.1.0'

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: Build application
        run: bun run build

      - name: Generate session secret
        run: echo "SESSION_SECRET=$(openssl rand -base64 32)" >> .env.local

      - name: Start application
        run: bun run start &
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Wait for application to be ready
        run: |
          timeout 120 bash -c 'until curl -f http://localhost:3000 > /dev/null 2>&1; do sleep 5; done'
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Run visual regression tests
        run: bunx playwright test --grep "visual|snapshot" --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload visual diff
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diffs
          path: test-results/
          retention-days: 7
