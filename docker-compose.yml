services:
  ui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-local}
    image: registry.rtt.in.th/spinsoft-transcription/registry-dashboard-ui:beta-1
    container_name: registry-dashboard-ui
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "${UI_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATA_DIR: /app/data
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set}
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD:-admin123}
    volumes:
      - ui-data:/app/data
    networks:
      - registry-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  ui-data:
    driver: local

networks:
  registry-net:
    driver: bridge
