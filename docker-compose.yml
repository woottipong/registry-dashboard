services:
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: registry-dashboard-ui:latest
    container_name: registry-dashboard-ui
    restart: unless-stopped
    ports:
      - "${UI_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATA_DIR: /app/data
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set}
    volumes:
      - ui-data:/app/data
    depends_on:
      registry:
        condition: service_healthy
    networks:
      - registry-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  ui-data:
    driver: local

networks:
  registry-net:
    driver: bridge
